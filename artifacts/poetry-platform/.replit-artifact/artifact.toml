kind = "web"
previewPath = "/"
title = "National Poets Evaluation Platform"
version = "1.0.0"
id = "artifacts/poetry-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20538

[services.development]
run = "pnpm --filter @workspace/poetry-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poetry-platform", "run", "build" ]
publicDir = "artifacts/poetry-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20538"
BASE_PATH = "/"
